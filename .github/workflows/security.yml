name: Security

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

jobs:
  # -------------------------------------------------------------------
  # JOB 1 — Gitleaks — scan secrets (SHA épinglé)
  # -------------------------------------------------------------------
  gitleaks:
    name: Gitleaks — scan secrets
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # -------------------------------------------------------------------
  # JOB 2 — Trivy filesystem scan (SHA épinglé, exit-code bloquant)
  # Fix : était @master (tag flottant = vecteur supply chain)
  # Fix : était exit-code 0 (cosmétique) → 1 (bloquant)
  # -------------------------------------------------------------------
  trivy-primary:
    name: Trivy — scan filesystem
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Trivy scan
        uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9bd0d8
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

  # -------------------------------------------------------------------
  # JOB 3 — pip-audit — double contrôle indépendant de Trivy
  # Script Python dans un fichier séparé pour éviter les erreurs YAML
  # -------------------------------------------------------------------
  pip-audit-secondary:
    name: pip-audit — double contrôle Python
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit --quiet

      - name: Audit requirements files
        run: |
          FOUND=false
          for req in requirements*.txt; do
            if [ -f "$req" ]; then
              echo "Auditing $req"
              FOUND=true
              pip-audit -r "$req" || true
            fi
          done
          if [ -f "pyproject.toml" ]; then
            echo "Auditing pyproject.toml"
            pip-audit --no-deps || true
            FOUND=true
          fi
          if [ "$FOUND" = "false" ]; then
            echo "Aucun fichier de dependances trouve — skip"
          fi

  # -------------------------------------------------------------------
  # JOB 4 — Checkov — scan IaC (Dockerfile + docker-compose)
  # -------------------------------------------------------------------
  checkov:
    name: Checkov — IaC scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install Checkov
        run: pip install checkov --quiet

      - name: Scan docker-compose.yml
        run: |
          checkov -f docker-compose.yml \
            --framework dockerfile,docker_compose \
            --quiet --compact --soft-fail 2>/dev/null || true

      - name: Scan Dockerfiles
        run: |
          find . -name "Dockerfile*" ! -path "./.git/*" | while read -r f; do
            echo "Checkov : $f"
            checkov -f "$f" \
              --framework dockerfile \
              --quiet --compact --soft-fail 2>/dev/null || true
          done

  # -------------------------------------------------------------------
  # JOB 5 — Vérification actions GitHub non épinglées sur SHA
  # -------------------------------------------------------------------
  actions-integrity:
    name: Actions — vérification SHA épinglés
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Détecter actions avec tag flottant
        run: |
          echo "Scan des workflows pour actions non epinglees..."
          find .github/workflows/ -name "*.yml" | while read -r wf; do
            echo "--- $wf ---"
            grep -n "uses:" "$wf" \
              | grep -v "@[a-f0-9]\{40\}" \
              | while read -r line; do
                echo "  WARN tag flottant : $line"
              done
          done
          echo "Scan termine"
        continue-on-error: true
