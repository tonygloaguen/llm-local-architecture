name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # -----------------------------------------------------------------------
  # JOB 1 — Lint bash + validation syntaxique
  # -----------------------------------------------------------------------
  lint-bash:
    name: Lint bash scripts
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2 — SHA épinglé

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint bootstrap.sh
        run: shellcheck -S warning bootstrap.sh

      - name: Lint scripts/
        run: |
          find scripts/ -name "*.sh" 2>/dev/null | while read -r f; do
            echo "Checking $f"
            shellcheck -S warning "$f"
          done

      - name: Validate JSON files
        run: |
          find . -name "*.json" ! -path "./.git/*" | while read -r f; do
            echo "Validating $f"
            python3 -m json.tool "$f" > /dev/null && echo "  OK"
          done

      - name: Validate YAML files
        run: |
          pip install yamllint --quiet
          find . -name "*.yml" ! -path "./.git/*" ! -path "./node_modules/*" | while read -r f; do
            echo "Checking $f"
            yamllint -d relaxed "$f"
          done

  # -----------------------------------------------------------------------
  # JOB 2 — Validation Docker Compose
  # -----------------------------------------------------------------------
  validate-docker:
    name: Validate Docker Compose
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Validate docker-compose.yml syntax
        run: docker compose config --quiet

      - name: Check for privileged containers
        run: |
          if grep -q "privileged: true" docker-compose.yml; then
            echo "ERREUR : container privileged détecté dans docker-compose.yml"
            exit 1
          fi
          echo "OK : aucun container privileged"

      - name: Check for non-root USER in Dockerfiles
        run: |
          find . -name "Dockerfile*" | while read -r f; do
            echo "Checking $f"
            if ! grep -q "^USER " "$f"; then
              echo "  WARN : pas de directive USER dans $f — container tourne en root"
            else
              echo "  OK : USER trouvé dans $f"
            fi
          done

  # -----------------------------------------------------------------------
  # JOB 3 — Scan dépendances Python (pip-audit)
  # -----------------------------------------------------------------------
  pip-audit:
    name: Python dependencies audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit --quiet

      - name: Scan requirements files
        run: |
          FOUND=false
          for req in requirements*.txt pyproject.toml; do
            if [ -f "$req" ]; then
              echo "Scanning $req"
              FOUND=true
              if [ "$req" = "pyproject.toml" ]; then
                pip-audit --no-deps 2>/dev/null || true
              else
                pip-audit -r "$req" || true
              fi
            fi
          done
          if [ "$FOUND" = "false" ]; then
            echo "Aucun fichier de dépendances trouvé — skip"
          fi

  # -----------------------------------------------------------------------
  # JOB 4 — Test fonctionnel minimal des scripts
  # -----------------------------------------------------------------------
  test-scripts:
    name: Test fonctionnel scripts
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Test bootstrap.sh syntax + dry-run
        run: |
          bash -n bootstrap.sh && echo "Syntaxe OK"
          # Vérifier les fonctions critiques sans exécuter
          grep -q "detect_ollama_base" bootstrap.sh && echo "detect_ollama_base : présent"
          grep -q "set -euo pipefail" bootstrap.sh && echo "set -euo pipefail : présent"
          grep -q "sha256sum" bootstrap.sh && echo "sha256sum check : présent"

      - name: Verify required files exist
        run: |
          for f in bootstrap.sh docker-compose.yml deploy-windows.ps1 README.md; do
            if [ -f "$f" ]; then
              echo "OK : $f"
            else
              echo "MANQUANT : $f"
              exit 1
            fi
          done

      - name: Check no hardcoded secrets patterns
        run: |
          # Patterns suspects (faux positifs possibles, non bloquant)
          echo "Scan patterns secrets dans les scripts..."
          grep -rn \
            -e "password\s*=" \
            -e "secret\s*=" \
            -e "api_key\s*=" \
            -e "token\s*=" \
            --include="*.sh" --include="*.py" --include="*.ps1" \
            . 2>/dev/null | grep -v ".git" | grep -v "#" || echo "Aucun pattern suspect détecté"
