name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # -------------------------------------------------------------------
  # JOB 1 — Lint bash + validation syntaxique
  # -------------------------------------------------------------------
  lint-bash:
    name: Lint bash scripts
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint bootstrap.sh
        run: shellcheck -S warning bootstrap.sh

      - name: Lint scripts/
        run: |
          find scripts/ -name "*.sh" 2>/dev/null \
            | while read -r f; do
              echo "Checking $f"
              shellcheck -S warning "$f"
            done

      - name: Validate JSON files
        run: |
          find . -name "*.json" ! -path "./.git/*" \
            | while read -r f; do
              echo "Validating $f"
              python3 -m json.tool "$f" > /dev/null && echo "  OK"
            done

      - name: Validate YAML files (hors workflows)
        run: |
          pip install yamllint --quiet
          # Exclure .github/workflows/ — les lignes longues sont normales
          # dans les workflows GitHub Actions (SHA, commentaires)
          find . -name "*.yml" \
            ! -path "./.git/*" \
            ! -path "./.github/workflows/*" \
            ! -path "./node_modules/*" \
            | while read -r f; do
              echo "Checking $f"
              yamllint -d relaxed "$f"
            done

  # -------------------------------------------------------------------
  # JOB 2 — Validation Docker Compose
  # -------------------------------------------------------------------
  validate-docker:
    name: Validate Docker Compose
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Validate docker-compose.yml syntax
        run: docker compose config --quiet

      - name: Check pas de container privileged
        run: |
          if grep -q "privileged: true" docker-compose.yml; then
            echo "ERREUR : container privileged detecte"
            exit 1
          fi
          echo "OK : aucun container privileged"

      - name: Check directive USER dans Dockerfiles
        run: |
          find . -name "Dockerfile*" ! -path "./.git/*" \
            | while read -r f; do
              echo "Checking $f"
              if ! grep -q "^USER " "$f"; then
                echo "  WARN : pas de USER dans $f (root)"
              else
                echo "  OK : USER present dans $f"
              fi
            done

  # -------------------------------------------------------------------
  # JOB 3 — pip-audit dépendances Python
  # -------------------------------------------------------------------
  pip-audit:
    name: Python dependencies audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit --quiet

      - name: Scan requirements
        run: |
          FOUND=false
          for req in requirements*.txt; do
            if [ -f "$req" ]; then
              echo "Scanning $req"
              FOUND=true
              pip-audit -r "$req" || true
            fi
          done
          if [ -f "pyproject.toml" ]; then
            pip-audit --no-deps || true
            FOUND=true
          fi
          if [ "$FOUND" = "false" ]; then
            echo "Aucun fichier de dependances — skip"
          fi

  # -------------------------------------------------------------------
  # JOB 4 — Tests fonctionnels minimaux des scripts
  # -------------------------------------------------------------------
  test-scripts:
    name: Test fonctionnel scripts
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Test bootstrap.sh dry-run
        run: |
          bash -n bootstrap.sh && echo "Syntaxe OK"
          grep -q "detect_ollama_base" bootstrap.sh \
            && echo "detect_ollama_base : present"
          grep -q "set -euo pipefail" bootstrap.sh \
            && echo "set -euo pipefail : present"
          grep -q "sha256sum" bootstrap.sh \
            && echo "sha256sum check : present"

      - name: Verify fichiers requis
        run: |
          for f in bootstrap.sh docker-compose.yml \
                   deploy-windows.ps1 README.md; do
            if [ -f "$f" ]; then
              echo "OK : $f"
            else
              echo "MANQUANT : $f"
              exit 1
            fi
          done

      - name: Scan patterns secrets dans scripts
        run: |
          echo "Scan patterns suspects..."
          grep -rn \
            -e "password\s*=" \
            -e "secret\s*=" \
            -e "api_key\s*=" \
            --include="*.sh" \
            --include="*.py" \
            --include="*.ps1" \
            . 2>/dev/null \
            | grep -v ".git" \
            | grep -v "#" \
            || echo "Aucun pattern suspect detecte"
